<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DayNote</title>
  </head>
  <body>
    <main id="app" class="note-shell">
      <header class="note-header" data-tauri-drag-region>
        <button class="icon-button" type="button" aria-label="上一天">
          <span aria-hidden="true">‹</span>
        </button>
        <div class="date-stack" data-tauri-drag-region>
          <span class="weekday" data-tauri-drag-region>星期一</span>
          <h1 data-tauri-drag-region>6月15日</h1>
        </div>
        <button class="icon-button" type="button" aria-label="下一天">
          <span aria-hidden="true">›</span>
        </button>
      </header>

      <section class="composer" aria-label="添加计划">
        <input
          type="text"
          placeholder="写下一件今天要完成的小事"
          aria-label="计划内容"
        />
        <button type="button">添加</button>
      </section>

      <section class="empty-state" aria-label="空计划">
        <div class="empty-mark" aria-hidden="true"></div>
        <p>今天还很安静。</p>
        <span>输入一条计划后，这里会成为你的轻量清单。</span>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
